version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: microservices-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Zw6M3_CP4uZKC4
    ports:
      - "1434:1433" #changed ports to not collide with another project
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Zw6M3_CP4uZKC4' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  logging-service:
    build:
      context: .
      dockerfile: src/LoggingService/Dockerfile
    container_name: logging-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__DefaultConnection=Server=microservices-sqlserver;Database=MicroservicesLogging;User Id=sa;Password=Zw6M3_CP4uZKC4;TrustServerCertificate=True;
    ports:
      - "6003:80"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - microservices-network

  product-service:
    build:
      context: .
      dockerfile: src/ProductService/Dockerfile
    container_name: product-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__DefaultConnection=Server=microservices-sqlserver;Database=MicroservicesProduct;User Id=sa;Password=Zw6M3_CP4uZKC4;TrustServerCertificate=True;
      - Services__LoggingService=http://logging-service:80
    ports:
      - "6001:80"
    depends_on:
      - logging-service
    networks:
      - microservices-network

  order-service:
    build:
      context: .
      dockerfile: src/OrderService/Dockerfile
    container_name: order-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__DefaultConnection=Server=microservices-sqlserver;Database=MicroservicesOrder;User Id=sa;Password=Zw6M3_CP4uZKC4;TrustServerCertificate=True;
      - Services__ProductService=http://product-service:80
      - Services__LoggingService=http://logging-service:80
    ports:
      - "6002:80"
    depends_on:
      - product-service
      - logging-service
    networks:
      - microservices-network

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    container_name: api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
    ports:
      - "6000:80"
    depends_on:
      - product-service
      - order-service
      - logging-service
    networks:
      - microservices-network

  web:
    build:
      context: .
      dockerfile: src/Web/Dockerfile
    container_name: web-ui
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - Services__ApiGateway=http://api-gateway:80
    ports:
      - "6004:80"
    depends_on:
      - api-gateway
      - product-service
      - order-service
      - logging-service
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  sqlserver-data:
