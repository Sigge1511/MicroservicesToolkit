version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: microservices-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=E7873723AE9A4462AC00417525D0CE1D
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - microservices-network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong@Password123" -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 5

  logging-service:
    build:
      context: .
      dockerfile: src/LoggingService/Dockerfile
    container_name: logging-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=MicroservicesLogging;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True;
    ports:
      - "5003:80"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - microservices-network

  product-service:
    build:
      context: .
      dockerfile: src/ProductService/Dockerfile
    container_name: product-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Services__LoggingService=http://logging-service:80
    ports:
      - "5001:80"
    depends_on:
      - logging-service
    networks:
      - microservices-network

  order-service:
    build:
      context: .
      dockerfile: src/OrderService/Dockerfile
    container_name: order-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Services__ProductService=http://product-service:80
      - Services__LoggingService=http://logging-service:80
    ports:
      - "5002:80"
    depends_on:
      - product-service
      - logging-service
    networks:
      - microservices-network

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    container_name: api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:80"
    depends_on:
      - product-service
      - order-service
      - logging-service
    networks:
      - microservices-network

  web:
    build:
      context: .
      dockerfile: src/Web/Dockerfile
    container_name: web-ui
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Services__ApiGateway=http://api-gateway:80
      - Services__ProductService=http://product-service:80
      - Services__OrderService=http://order-service:80
      - Services__LoggingService=http://logging-service:80
    ports:
      - "5004:80"
    depends_on:
      - api-gateway
      - product-service
      - order-service
      - logging-service
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  sqlserver-data:
